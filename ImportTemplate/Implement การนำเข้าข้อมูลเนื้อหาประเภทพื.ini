Implement การนำเข้าข้อมูลเนื้อหาประเภทพืชจาก ไฟล์ Excel โดยมี Template ดังนี้

A3 = ชื่อเรือง
B3 = ชื่ออื่น
C3 = ลักษณะ/คุณสมบัติ
D3 = ประโยชน์
E3 = แหล่งที่พบ
F3 = พิกัด สามารถระบุได้ 2 แบบ คือ 47N,541659.42,1004476.58(UTM) หรือ 9.0868565,99.3791066 (LatLong)

G3 = ภูมิภาค 
H3 = จังหวัด 
I3 = อำเภอ 
J3 = ตำบล 
K3 = รหัสไปรษณีย์ - หากที่อยู่(G3-K3)ระบุไม่ครบหรือขาดสักอัน ให้ auto จากพิกัด

L3 = รูปภาพหน้าปก - ยังไม่ต้องใส่ให้ก่อน เตรียม Implement ภายหลัง
M3 = ฤดูกาลที่ใช้ประโยชน์ได้
M3 = ศักยภาพการใช้งานในชุมชน
O3 = ชื่อสามัญ
P3 = ชื่อวิทยาศาสตร์
Q3 = ชื่อวงศ์
R3 = รูปประกอบ
S3 = แหล่งที่มาของภาพ - ยังไม่ต้องใส่ให้ก่อน เตรียม Implement ภายหลัง
T3 = แหล่งที่มาของข้อมูล
U3 = หมายเหตุ
V3 = สถานะ - ระบุ PENDING, APPROVE, REJECT
W3 = สัญญาอนุญาต (License)  - ยังไม่ต้องใส่ให้ก่อน เตรียม Implement ภายหลัง
X3 = การแสดงผล  - ใส่เป็นแสดงใส่ให้ก่อน เตรียม Implement ภายหลัง

และหลังจาก Import ไปแล้วให้ไปยังหน้าสรุปผลว่าแต่ละรายการติดปัญหาอะไรบ้างโดยจะบันทึกเป็นฉบับร่างไว้ก่อน และเมื่อกดยืนยันให้เผยแพร่
**สามารถระบุได้หลายเนื้อหาพร้อมกันตั้งแต่ A3-X3 ไปจนถึง A23-X23 (สามารถ config ได้แต่เริ่มต้นเอาแค่ 20)**
*NULL = ค่าว่าง*
*ไม่ระบุ = ค่าว่าง*